services:
  postgres:
    image: postgres:16-alpine
    container_name: viajario-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-viajario}
      POSTGRES_USER: ${POSTGRES_USER:-viajario}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-troque-esta-senha-local}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U viajario -d viajario"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
